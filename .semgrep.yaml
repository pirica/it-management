# Opengrep / Codacy configuration for PHP security rules.
# Why: Codacy flags URL query-string href builders (create.php? + rawurlencode) as SQL
# injection because the sink regex matches the word "create". Downgrade severity to
# WARNING and treat rawurlencode/htmlspecialchars/http_build_query as sanitizers for
# href/query construction false positives.
#
# After merge: Codacy → Repository → Code patterns → Opengrep → enable "Configuration file".
rules:
  - id: tainted-sql-string
    languages:
      - php
    severity: WARNING
    message: >-
      User data flows into this manually-constructed SQL string. User data can be safely inserted
      into SQL strings using prepared statements or an object-relational mapper (ORM). Manually-constructed
      SQL strings is a possible indicator of SQL injection, which could let an attacker steal or manipulate
      data from the database. Instead, use prepared statements (`$mysqli->prepare("INSERT INTO test(id,
      label) VALUES (?, ?)");`) or a safe library.
    metadata:
      category: security
      technology:
        - php
    mode: taint
    pattern-sanitizers:
      - pattern-either:
          - pattern: mysqli_real_escape_string(...)
          - pattern: real_escape_string(...)
          - pattern: $MYSQLI->real_escape_string(...)
          - pattern: rawurlencode(...)
          - pattern: htmlspecialchars(...)
          - pattern: http_build_query(...)
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $_GET
              - pattern: $_POST
              - pattern: $_COOKIE
              - pattern: $_REQUEST
    pattern-sinks:
      - pattern-either:
          - patterns:
              - pattern: |
                  sprintf($SQLSTR, ...)
              - metavariable-regex:
                  metavariable: $SQLSTR
                  regex: (?is).*\b(select|delete|insert|create|update|alter|drop)\b.*
          - patterns:
              - pattern: |
                  "...$EXPR..."
              - metavariable-regex:
                  metavariable: $EXPR
                  regex: (?is).*\b(select|delete|insert|create|update|alter|drop)\b.*
          - patterns:
              - pattern: |
                  "$SQLSTR".$EXPR
              - metavariable-regex:
                  metavariable: $SQLSTR
                  regex: (?is).*\b(select|delete|insert|create|update|alter|drop)\b.*
