name: Smoke tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mysqli
          coverage: none

      - name: Run smoke test runner
        run: bash scripts/smoke_test.sh
        env:
          # UI layout audit reports known legacy module gaps; run locally without this flag.
          SMOKE_SKIP_UI_CONFIG: '1'
