name: Smoke tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

# Why: GitHub is deprecating Node.js 20 for JavaScript actions (checkout, setup-php, etc.).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mysqli
          coverage: none

      - name: Run smoke test runner
        run: bash scripts/smoke_test.sh

  database-import:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: itmanagement
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -pitmanagement"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mysqli
          coverage: none

      # CI uses monolith database.sql; local dev may use bash scripts/import_database_split.sh (db/01→02→03).
      - name: Import database.sql
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PASSWORD: itmanagement
        run: bash scripts/verify_database_sql_import.sh

      - name: Verify FK label search regression
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PASSWORD: itmanagement
        run: php scripts/verify_crud_fk_label_search.php
